<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BobaWay | Typewanese</title>
  <link rel="stylesheet" href="./static/styles/shared.css">
  <link rel="stylesheet" href="./static/styles/typewanese.css">
  <link rel="icon" type="image/x-icon" href="./static/img/flav/flav_8.png">
  <link rel="apple-touch-icon" sizes="128x128" href="./static/img/flav/flav_8.png">
  <meta property="og:image" content="./static/img/flav/flav_8.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="1024">
  <meta property="og:description" content="Easily type in Taiwanese!">
</head>
<body onload="loadOptions()">
  <!-- Professional Navbar -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/home" class="navbar-brand">Typewanese</a>
      <div class="navbar-nav">
        <div class="dropdown">
          <button class="dropdown-toggle">Apps</button>
          <div class="dropdown-content">
            <a href="/app">BobaWay</a>
            <a href="/tai-ping">Tai-Ping</a>
            <a href="/typewanese">Typewanese</a>
            <a href="/sino-type">Sino-Type</a>
          </div>
        </div>
        <a href="/about">About</a>
        <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQDR9Uki-ei757OyyAjvf-wzQFnhPuK3R4r0CKqUdoyXTgFX8I6DxVnCewjoWFyKN9rVjp7kyHIgJ9w/pubhtml?gid=0&single=true" target="_blank">Feedback</a>
        <a href="/sino-type/admin-login">Login</a>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <form id="mainform" name="mainform" action="{{ url_for("typewanese")}}" method="post">
      <div style="justify-content: center; align-items: middle; display: flex; flex-direction: column">
        <textarea id="ogg" name="ogg" style="display: none">{{ogg}}</textarea>
        <textarea id="hour" name="hour" style="display: none">{{hour}}</textarea>
        <textarea id="options" name="options" style="display: none">{{options}}</textarea>
        <textarea id="tai" name="tai" style="display: none">{{tai}}</textarea>
        <textarea id="path" name="path" style="display: none">typewanese-1</textarea>
        <div style="display: flex; flex-direction: row; align-items: center; justify-content: center">
          <div id="text_box" name="text_box"><pre id="black">{{ogg}}</pre><textarea id="red" name="red" onchange="changePath()">&nbsp;{{red}}</textarea><img src="./static/img/copy.png" class="copy" onclick="copyTextToClipboard()"></div>
          <button class="search-button" type="submit">Search</button>
        </div>
        <div id="options-container"></div>
      </div>
    </form>
  </div>
</body>
  <script type="text/javascript" src="./static/scripts/typewanese.js"></script>
</html>
